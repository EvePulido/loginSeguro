<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Sistema seguro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa; /* Fondo gris claro */
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #343a40;
        }
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.05);
            background-color: #ffffff !important;
        }
        .navbar-brand {
            color: #007bff !important; /* Color azul para el brand */
            font-weight: bold;
            font-size: 1.5rem;
        }
        .admin-header {
            background: linear-gradient(135deg, #007bff, #0056b3); /* Degradado azul */
            color: white;
            padding: 3rem 1.5rem;
            border-radius: .75rem;
            margin-bottom: 2.5rem;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,.15);
        }
        .admin-header h1 {
            font-size: 2.8rem;
            font-weight: 700;
        }
        .logout-btn {
            background-color: #dc3545;
            border-color: #dc3545;
            transition: all 0.3s ease;
            font-weight: 600;
            color: white;
        }
        .logout-btn:hover {
            background-color: #c82333;
            border-color: #bd2130;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,.2);
        }
        .main-container {
            padding: 2rem;
            max-width: 1200px; /* Un poco más de ancho para la tabla */
            margin: auto;
        }
        .card {
            border: none;
            border-radius: .75rem;
            box-shadow: 0 4px 12px rgba(0,0,0,.08); /* Sombra suave para la card */
        }
        .table {
            border-collapse: separate;
            border-spacing: 0 8px; /* Espaciado entre filas */
        }
        .table thead th {
            background-color: #f8f9fa; /* Fondo claro para el encabezado de la tabla */
            border-bottom: 2px solid #dee2e6; /* Línea inferior más marcada */
            font-weight: 600;
            color: #495057;
        }
        .table tbody tr {
            background-color: #fff;
            box-shadow: 0 2px 4px rgba(0,0,0,.04);
            transition: transform 0.2s;
        }
        .table tbody tr:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,.08);
        }
        .table td, .table th {
            border: none;
            padding: 1.25rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link position-absolute">Saltar al contenido principal</a>

    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light" aria-label="Navegación principal">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Panel de Administración</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegación">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="btn logout-btn shadow-sm" href="/logout" role="button" aria-label="Cerrar sesión de administrador">
                            Cerrar Sesión
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main id="main-content" class="main-container">
        <div class="admin-header">
            <h1>Panel de Administrador</h1>
            <p class="lead mb-0">Bienvenido, {{USERNAME}}</p>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <h2 class="card-title h4 mb-4">Usuarios Registrados</h2>
                <div class="table-responsive">
                    <table class="table" aria-label="Lista de usuarios registrados">
                        <thead>
                            <tr>
                                <th scope="col">Usuario</th>
                                <th scope="col">Contraseña Hasheada</th>
                                <th scope="col">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {{TABLE_ROWS}}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal para editar usuario -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Editar Contraseña de <span id="editUsername"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="editUsernameInput" class="form-label">Nombre de Usuario</label>
                        <input type="text" class="form-control" id="editUsernameInput" required>
                    </div>
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">Nueva Contraseña (dejar en blanco para no cambiar)</label>
                        <input type="password" class="form-control" id="newPassword">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="saveEditBtn">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para eliminar usuario -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteModalLabel">Eliminar Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>¿Estás seguro de que deseas eliminar al usuario <strong id="deleteUsernameDisplay"></strong>?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Eliminar</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const editModal = new bootstrap.Modal(document.getElementById('editModal'));
            const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            let currentEditingUser = '';
            let currentDeletingUser = '';

            // Manejar clics en botones de eliminar
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentDeletingUser = e.target.getAttribute('data-username');
                    document.getElementById('deleteUsernameDisplay').textContent = currentDeletingUser;
                    deleteModal.show();
                });
            });

            // Confirmar eliminación
            document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
                const response = await fetch('/admin/delete-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentDeletingUser })
                });
                const result = await response.json();
                if (result.success) {
                    deleteModal.hide();
                    location.reload();
                } else {
                    alert('Error al eliminar usuario: ' + result.message);
                }
            });

            // Manejar clics en botones de editar
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentEditingUser = e.target.getAttribute('data-username');
                    document.getElementById('editUsername').textContent = currentEditingUser;
                    document.getElementById('editUsernameInput').value = currentEditingUser;
                    document.getElementById('newPassword').value = '';
                    editModal.show();
                });
            });

            // Guardar cambios de edición
            document.getElementById('saveEditBtn').addEventListener('click', async () => {
                const newUsername = document.getElementById('editUsernameInput').value;
                const newPassword = document.getElementById('newPassword').value;

                if (!newUsername) {
                    alert('El nombre de usuario no puede estar vacío');
                    return;
                }

                const response = await fetch('/admin/edit-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: currentEditingUser, 
                        newUsername, 
                        newPassword 
                    })
                });
                const result = await response.json();
                if (result.success) {
                    editModal.hide();
                    location.reload();
                } else {
                    alert('Error al editar usuario: ' + result.message);
                }
            });
        });
    </script>
</body>
</html>
